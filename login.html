<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLyrics | Join the Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #FFD32D; --dark: #1a1a1a; --glass: rgba(255, 255, 255, 0.8); }
        
        * { box-sizing: border-box; transition: 0.3s; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #f0f2f5;
            background: linear-gradient(135deg, #FFD32D 0%, #ff9f43 100%);
        }

        .auth-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-area { font-size: 40px; margin-bottom: 10px; }
        h2 { font-weight: 800; margin-bottom: 5px; color: var(--dark); }
        p { font-size: 14px; color: #666; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 15px; }
        input { 
            width: 100%; 
            padding: 18px 25px; 
            border-radius: 20px; 
            border: 2px solid transparent; 
            background: white; 
            font-weight: 600; 
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: var(--main); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            border: none; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary { background: var(--dark); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-primary:hover { transform: translateY(-3px); background: #333; }
        
        .toggle-link { 
            margin-top: 20px; 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--dark); 
            text-decoration: none;
            cursor: pointer;
        }

        .error-msg { 
            background: #ff4757; color: white; 
            padding: 10px; border-radius: 12px; 
            font-size: 12px; font-weight: 700; 
            margin-bottom: 15px; display: none; 
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">🐾</div>
        <h2 id="title">Log Masuk</h2>
        <p id="sub-title">Sertai komuniti MeowLyrics</p>

        <div id="error-box" class="error-msg"></div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Nama Akaun (Username)">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Kata Laluan">
        </div>

        <button class="btn btn-primary" id="main-btn">Masuk</button>
        <div class="toggle-link" id="switch-mode">Belum ada akaun? Daftar sekarang</div>
        
        <a href="/" style="display:block; margin-top:20px; font-size:12px; color:#666; text-decoration:none;">← Kembali ke Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLogin = true;

        const switchBtn = document.getElementById('switch-mode');
        const mainBtn = document.getElementById('main-btn');
        const errorBox = document.getElementById('error-box');

        // Tukar mode Login/Register
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Log Masuk" : "Daftar Akaun";
            mainBtn.innerText = isLogin ? "Masuk" : "Daftar";
            switchBtn.innerText = isLogin ? "Belum ada akaun? Daftar sekarang" : "Dah ada akaun? Log masuk";
        };

        mainBtn.onclick = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const fakeEmail = `${user}@meow.com`; // Trik untuk Firebase Auth

            if(!user || !pass) return showErr("Sila isi semua ruangan!");
            errorBox.style.display = "none";

            if(isLogin) {
                // PROSES LOGIN
                try {
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                    window.location.href = "/";
                } catch (e) {
                    showErr("Username atau Kata Laluan salah!");
                }
            } else {
                // PROSES DAFTAR
                try {
                    // 1. Cek dulu username dah ada belum kat Firestore
                    const userRef = doc(db, "usernames", user);
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        return showErr("Nama akaun sudah digunakan!");
                    }

                    // 2. Register di Auth
                    const res = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    
                    // 3. Simpan username & Set Display Name
                    await setDoc(doc(db, "usernames", user), { uid: res.user.uid });
                    await updateProfile(res.user, { displayName: user });
                    
                    alert("Akaun berjaya dicipta! Meow! 🐾");
                    window.location.href = "/";
                } catch (e) {
                    showErr("Gagal daftar: Pastikan password 6 aksara ke atas.");
                }
            }
        };

        function showErr(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = "block";
        }
    </script>
</body>
</html>
