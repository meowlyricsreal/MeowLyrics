<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLyrics | Masuk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --soft-yellow: #FFF9E3; --deep-yellow: #FFD32D; --text: #444; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--soft-yellow); 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 30px; width: 85%; max-width: 350px;
            box-shadow: 0 15px 35px rgba(255, 211, 45, 0.2); text-align: center;
        }
        .logo-text { font-weight: 800; font-size: 24px; color: var(--text); margin-bottom: 20px; }
        .logo-text span { background: var(--deep-yellow); padding: 4px 10px; border-radius: 10px; }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; 
            border: 2px solid #F1F1F1; outline: none; box-sizing: border-box; font-weight: 600;
        }
        input:focus { border-color: var(--deep-yellow); }
        
        .btn-masuk { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: var(--deep-yellow); color: #333; font-weight: 800; cursor: pointer;
        }
        .switch-text { font-size: 13px; margin-top: 20px; color: #888; cursor: pointer; font-weight: 700; }
        .error-msg { color: #ff4757; font-size: 12px; margin-bottom: 10px; display: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-text"><span>Meow</span>Lyrics</div>
        <p style="font-size: 14px; color: #777;" id="desc">Sila masukkan nama akaun unik awak</p>
        
        <div id="error-box" class="error-msg"></div>

        <input type="text" id="username" placeholder="Nama Akaun (Contoh: bloxy)">
        <input type="password" id="password" placeholder="Kata Laluan">

        <button class="btn-masuk" id="actionBtn">Masuk Sekarang</button>
        <div class="switch-text" id="toggleBtn">Belum ada akaun? Daftar di sini</div>
        
        <a href="/" style="display:block; margin-top:15px; text-decoration:none; font-size:12px; color: #aaa;">Kembali ke Utama</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLogin = true;
        const actionBtn = document.getElementById('actionBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const errorBox = document.getElementById('error-box');

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('desc').innerText = isLogin ? "Sila masukkan nama akaun unik awak" : "Cipta akaun baru awak sekarang";
            actionBtn.innerText = isLogin ? "Masuk Sekarang" : "Daftar Akaun";
            toggleBtn.innerText = isLogin ? "Belum ada akaun? Daftar di sini" : "Dah ada akaun? Log masuk";
        };

        actionBtn.onclick = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const fakeEmail = `${user}@meowlyrics.com`; // Trik fix unauthorized domain

            if(!user || pass.length < 6) {
                errorBox.innerText = "Isi semua & Password min 6 aksara!";
                errorBox.style.display = "block";
                return;
            }

            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                } else {
                    const userRef = doc(db, "usernames", user);
                    const snap = await getDoc(userRef);
                    if(snap.exists()) throw new Error("Nama akaun sudah diambil!");
                    
                    const res = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    await setDoc(userRef, { uid: res.user.uid });
                    await updateProfile(res.user, { displayName: user });
                }
                window.location.href = "/";
            } catch (e) {
                errorBox.innerText = e.message;
                errorBox.style.display = "block";
            }
        };
    </script>
</body>
</html>
