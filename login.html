<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MeowLyrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #FFFDF2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; }
        h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-google:hover { background: #357ae8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>MeowLyrics</h2>
        <p>Sila masuk untuk akses penuh</p>
        <button class="btn-google" id="loginBtn">Login dengan Google</button>
    </div>

    <script type="module">
        // 1. Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. Config Firebase Awak
        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        // 3. Start Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 4. Fungsi Butang Login
        document.getElementById('loginBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log("Berjaya login:", result.user.email);
                // Lepas berjaya, hantar terus ke halaman Admin
                window.location.href = "admin.html";
            } catch (error) {
                console.error("Ralat login:", error.message);
                alert("Gagal login: " + error.message);
            }
        };
    </script>
</body>
</html>
