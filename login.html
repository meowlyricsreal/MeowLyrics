<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
        authDomain: "meowlyrics-6eacb.firebaseapp.com",
        projectId: "meowlyrics-6eacb",
        appId: "1:183440345480:web:4fb71060be2cc24df0923d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const btn = document.getElementById('loginBtn');

    btn.onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            // KESELAMATAN: Semak adakah ini emel tuan punya MeowLyrics?
            if (user.email === "meowlyrics1@gmail.com") {
                alert("Selamat datang, Admin MeowLyrics!");
                window.location.href = "admin.html"; // Lepas masuk ke panel
            } else {
                // Jika orang lain, kita logout kan mereka serta-merta
                await auth.signOut();
                alert("AKSES DISEKAT! Hanya meowlyrics1@gmail.com sahaja boleh masuk.");
                window.location.href = "/"; // Tendang balik ke depan
            }
        } catch (error) {
            console.error("Ralat:", error);
            alert("Ralat Login: " + error.message);
        }
    };
</script>
