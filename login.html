<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLyrics | Sertai Komuniti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --kuning-cair: #FFF9E3; --utama: #FFD32D; --gelap: #2D3436; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--kuning-cair); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .kad-auth {
            background: white; padding: 40px; border-radius: 35px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(255, 211, 45, 0.1); text-align: center;
        }
        .logo-meow span { background: var(--utama); padding: 5px 12px; border-radius: 12px; font-weight: 800; }
        h2 { margin: 20px 0 5px; font-weight: 800; color: var(--gelap); }
        
        .input-box { text-align: left; margin-bottom: 15px; }
        .input-box label { font-size: 11px; font-weight: 800; margin-left: 10px; color: #bbb; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 16px; border-radius: 18px; 
            border: 2px solid #F8F8F8; outline: none; font-weight: 600; box-sizing: border-box;
            margin-top: 5px; background: #FCFCFC;
        }
        input:focus { border-color: var(--utama); background: white; }
        
        .btn-utama { 
            width: 100%; padding: 16px; border-radius: 18px; border: none; 
            background: var(--utama); color: var(--gelap); font-weight: 800; cursor: pointer; margin-top: 10px;
        }
        .tukar-mod { font-size: 13px; margin-top: 20px; color: #888; cursor: pointer; font-weight: 700; }
        #ralat { color: #ff4757; font-size: 12px; margin-bottom: 15px; display: none; font-weight: 800; padding: 10px; border-radius: 10px; background: #fff1f2; }
    </style>
</head>
<body>

    <div class="kad-auth">
        <div class="logo-meow"><span>Meow</span>Lyrics</div>
        <h2 id="tajuk">Log Masuk</h2>
        <p style="color:#888; font-size:13px; margin-bottom:25px;" id="info">Sila masuk untuk teruskan</p>

        <div id="ralat"></div>

        <div class="input-box" id="box-user" style="display:none;">
            <label>Nama Akaun</label>
            <input type="text" id="username" placeholder="Contoh: bloxy_nick">
        </div>

        <div class="input-box">
            <label>Emel</label>
            <input type="email" id="email" placeholder="Contoh: meow@gmail.com">
        </div>

        <div class="input-box">
            <label>Kata Laluan</label>
            <input type="password" id="password" placeholder="Min 6 aksara">
        </div>

        <button class="btn-utama" id="btnHantar">Masuk Sekarang</button>
        <div class="tukar-mod" id="btnTukar">Belum ada akaun? Daftar di sini</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let modLogin = true;
        const btnHantar = document.getElementById('btnHantar');
        const btnTukar = document.getElementById('btnTukar');
        const boxUser = document.getElementById('box-user');
        const ralatBox = document.getElementById('ralat');

        btnTukar.onclick = () => {
            modLogin = !modLogin;
            document.getElementById('tajuk').innerText = modLogin ? "Log Masuk" : "Daftar Akaun";
            btnHantar.innerText = modLogin ? "Masuk Sekarang" : "Daftar Sekarang";
            btnTukar.innerText = modLogin ? "Belum ada akaun? Daftar di sini" : "Dah ada akaun? Log masuk";
            boxUser.style.display = modLogin ? "none" : "block";
        };

        btnHantar.onclick = async () => {
            const emel = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const nama = document.getElementById('username').value.trim();

            if(!emel || pass.length < 6) return paparRalat("Emel & Password (min 6 aksara) wajib!");

            try {
                if(modLogin) {
                    await signInWithEmailAndPassword(auth, emel, pass);
                } else {
                    if(!nama) return paparRalat("Nama akaun wajib diisi!");
                    const res = await createUserWithEmailAndPassword(auth, emel, pass);
                    await updateProfile(res.user, { displayName: nama });
                }
                window.location.href = "/";
            } catch (e) {
                paparRalat(e.message);
            }
        };

        function paparRalat(mesej) {
            ralatBox.innerText = mesej;
            ralatBox.style.display = "block";
        }
    </script>
</body>
</html>
