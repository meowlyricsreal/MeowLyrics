<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MeowLyrics</title>
    <style>
        body { font-family: sans-serif; background: #FFFDF2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; }
        .btn { background: #2D3436; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🐾 MeowLyrics</h2>
        <p>Hanya MeowLyrics Official sahaja boleh masuk.</p>
        <button id="loginBtn" class="btn">Login dengan Google</button>
        <p id="msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        document.getElementById('loginBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                if (result.user.email === "meowlyrics1@gmail.com") {
                    window.location.href = "admin.html";
                } else {
                    alert("Akses Ditolak!");
                    await auth.signOut();
                    window.location.href = "/";
                }
            } catch (e) {
                document.getElementById('msg').innerText = "Ralat: " + e.code;
            }
        };
    </script>
</body>
</html>
