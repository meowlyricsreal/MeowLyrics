<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MeowLyrics Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #FFD32D; --bg: #FFFDF2; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* Hiasan background */
        .circle { position: absolute; width: 300px; height: 300px; background: var(--main); filter: blur(100px); border-radius: 50%; opacity: 0.2; z-index: -1; }

        .login-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.05); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            position: relative;
            border: 1px solid white;
        }

        /* Butang Pangkah */
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #f1f2f6;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2D3436;
            font-weight: 800;
            font-size: 14px;
        }
        .close-btn:hover { background: #dfe4ea; transform: rotate(90deg); }

        /* Profile Avatar Placeholder */
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--main);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(255, 211, 45, 0.3);
            border: 4px solid white;
        }

        h2 { font-weight: 800; margin-bottom: 10px; color: #2D3436; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        .btn-google { 
            background: #2D3436; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-google img { width: 20px; }

        #status { margin-top: 15px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="circle"></div>

    <div class="login-card">
        <a href="/" class="close-btn">✕</a>
        
        <div class="profile-avatar">👤</div>
        
        <h2>Admin Login</h2>
        <p>Sila log masuk menggunakan akaun rasmi <b>MeowLyrics</b> untuk akses panel.</p>
        
        <button class="btn-google" id="loginBtn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
            Teruskan dengan Google
        </button>
        
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        document.getElementById('loginBtn').onclick = async () => {
            const status = document.getElementById('status');
            status.style.color = "#2D3436";
            status.innerText = "Membuka Google...";

            try {
                const result = await signInWithPopup(auth, provider);
                if (result.user.email === "meowlyrics1@gmail.com") {
                    status.style.color = "green";
                    status.innerText = "Akses Diterima! Memasuki Admin Panel...";
                    setTimeout(() => window.location.href = "admin.html", 1000);
                } else {
                    status.style.color = "red";
                    status.innerText = "Akses Ditolak! Anda bukan Admin.";
                    await auth.signOut();
                }
            } catch (error) {
                status.style.color = "red";
                status.innerText = "Ralat: " + error.code;
            }
        };
    </script>
</body>
</html>
