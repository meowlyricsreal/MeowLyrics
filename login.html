<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowLyrics | Sertai Kami</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --soft-yellow: #FFF9E3; --main: #FFD32D; --dark: #2D3436; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--soft-yellow); 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 35px; width: 85%; max-width: 380px;
            box-shadow: 0 20px 40px rgba(255, 211, 45, 0.15); text-align: center;
        }
        .logo-box span { background: var(--main); padding: 5px 12px; border-radius: 12px; font-weight: 800; }
        h2 { margin-top: 20px; font-weight: 800; color: var(--dark); }
        input { 
            width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 18px; 
            border: 2px solid #F1F1F1; outline: none; font-weight: 600; box-sizing: border-box;
        }
        input:focus { border-color: var(--main); }
        .btn-action { 
            width: 100%; padding: 16px; border-radius: 18px; border: none; 
            background: var(--main); color: var(--dark); font-weight: 800; cursor: pointer; margin-top: 10px;
        }
        .toggle-text { font-size: 13px; margin-top: 20px; color: #888; cursor: pointer; font-weight: 700; }
        #error-msg { color: #ff4757; font-size: 12px; margin-bottom: 15px; display: none; font-weight: 800; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box"><span>Meow</span>Lyrics</div>
        <h2 id="form-title">Log Masuk</h2>
        <p style="color:#777; font-size:14px; margin-bottom:25px;" id="form-desc">Gunakan nama unik awak</p>

        <div id="error-msg"></div>

        <input type="text" id="username" placeholder="Nama Akaun (e.g. bloxy)">
        <input type="password" id="password" placeholder="Kata Laluan">

        <button class="btn-action" id="submitBtn">Masuk Sekarang</button>
        <div class="toggle-text" id="toggleMode">Belum ada akaun? Daftar di sini</div>
        
        <a href="/" style="display:block; margin-top:20px; text-decoration:none; font-size:12px; color:#aaa;">← Balik ke Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLogin = true;
        const submitBtn = document.getElementById('submitBtn');
        const toggleMode = document.getElementById('toggleMode');
        const errorBox = document.getElementById('error-msg');

        toggleMode.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Log Masuk" : "Daftar Akaun";
            submitBtn.innerText = isLogin ? "Masuk Sekarang" : "Daftar Sekarang";
            toggleMode.innerText = isLogin ? "Belum ada akaun? Daftar di sini" : "Dah ada akaun? Log masuk";
        };

        submitBtn.onclick = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const fakeEmail = `${user}@meow.com`;

            if(!user || pass.length < 6) {
                errorBox.innerText = "Isi semua & Password min 6 huruf!";
                errorBox.style.display = "block";
                return;
            }

            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                } else {
                    const snap = await getDoc(doc(db, "usernames", user));
                    if(snap.exists()) throw new Error("Nama akaun sudah digunakan!");
                    
                    const res = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    await setDoc(doc(db, "usernames", user), { uid: res.user.uid });
                    await updateProfile(res.user, { displayName: user });
                }
                window.location.href = "/";
            } catch (e) {
                errorBox.innerText = "Ralat: " + e.message;
                errorBox.style.display = "block";
            }
        };
    </script>
</body>
</html>
