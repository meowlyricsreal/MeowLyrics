<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MeowLyrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #FFD32D; --bg: #FFFDF2; --dark: #2D3436; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: none; /* Sorok selagi belum verify admin */ }
        
        .admin-container { max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h1 { font-weight: 800; font-size: 24px; margin-bottom: 30px; text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #F1F2F6; font-family: inherit; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: var(--main); }
        
        textarea { height: 150px; resize: vertical; }
        
        .btn-save { width: 100%; background: var(--main); color: var(--dark); border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-save:active { transform: scale(0.98); }
        
        .logout-link { display: block; text-align: center; margin-top: 20px; color: #A4B0BE; text-decoration: none; font-weight: 600; font-size: 13px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🐾 Admin MeowLyrics</h1>
        
        <div class="form-group">
            <label>Tajuk Lagu</label>
            <input type="text" id="songTitle" placeholder="Contoh: Tak Ingin Usai">
        </div>

        <div class="form-group">
            <label>Artis</label>
            <input type="text" id="songArtist" placeholder="Contoh: Keisya Levronka">
        </div>

        <div class="form-group">
            <label>Lirik Lagu</label>
            <textarea id="songLyrics" placeholder="Masukkan lirik di sini..."></textarea>
        </div>

        <div class="form-group">
            <label>URL Video YouTube</label>
            <input type="text" id="songYoutube" placeholder="Contoh: https://www.youtube.com/watch?v=xxxx">
        </div>

        <button class="btn-save" id="saveBtn">Simpan Lirik</button>
        
        <a href="#" id="logoutBtn" class="logout-link">Log Keluar Admin</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SISTEM BODYGUARD ---
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "meowlyrics1@gmail.com") {
                document.body.style.display = "block"; // Tunjukkan page kalau emel betul
            } else {
                alert("Akses Disekat! Anda bukan Admin.");
                window.location.href = "login.html"; // Tendang keluar kalau emel salah
            }
        });

        // --- FUNGSI SIMPAN LAGU ---
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.onclick = async () => {
            const title = document.getElementById('songTitle').value;
            const artist = document.getElementById('songArtist').value;
            const lyrics = document.getElementById('songLyrics').value;
            const youtubeUrl = document.getElementById('songYoutube').value;

            if (!title || !artist || !lyrics) {
                alert("Sila isi semua maklumat utama!");
                return;
            }

            saveBtn.innerText = "Menyimpan...";
            saveBtn.disabled = true;

            try {
                await addDoc(collection(db, "songs"), {
                    title: title,
                    artist: artist,
                    lyrics: lyrics,
                    youtubeUrl: youtubeUrl,
                    createdAt: serverTimestamp()
                });
                alert("Lirik berjaya disimpan! 🐾");
                location.reload(); // Refresh untuk kosongkan borang
            } catch (e) {
                alert("Gagal simpan: " + e.message);
                saveBtn.innerText = "Simpan Lirik";
                saveBtn.disabled = false;
            }
        };

        // --- FUNGSI LOGOUT ---
        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };
    </script>
</body>
</html>
