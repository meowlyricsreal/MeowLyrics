<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MeowLyrics</title>
    <style>
        body { font-family: sans-serif; background: #FFFDF2; padding: 20px; display: none; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .save-btn { width: 100%; padding: 15px; background: #FFD32D; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🐾 Tambah Lirik Baru</h3>
        <input type="text" id="t" placeholder="Tajuk Lagu">
        <input type="text" id="a" placeholder="Artis">
        <textarea id="l" placeholder="Lirik lagu..."></textarea>
        <input type="text" id="y" placeholder="Link YouTube (Contoh: https://youtube.com/...)">
        <button id="s" class="save-btn">Simpan Sekarang</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // KAWALAN AKSES: Cek emel admin
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "meowlyrics1@gmail.com") {
                document.body.style.display = "block";
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('s').onclick = async () => {
            const title = document.getElementById('t').value;
            const artist = document.getElementById('a').value;
            const lyrics = document.getElementById('l').value;
            const youtube = document.getElementById('y').value;

            if(!title || !artist || !lyrics) return alert("Isi semua!");

            try {
                await addDoc(collection(db, "songs"), {
                    title, artist, lyrics, youtubeUrl: youtube, createdAt: serverTimestamp()
                });
                alert("Berjaya!");
                location.reload();
            } catch(e) { alert("Ralat!"); }
        };
    </script>
</body>
</html>
