<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Meow Admin | Control Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #FDD835; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🖼️ Urus Album</h2>
        <input type="text" id="an" placeholder="Nama Album">
        <input type="text" id="au" placeholder="URL Gambar Album">
        <button onclick="addA()">Tambah Album</button>
        <div id="alList"></div>
    </div>

    <div class="card">
        <h2>🎵 Tambah Lirik & YouTube</h2>
        <input type="text" id="st" placeholder="Tajuk Lagu">
        <input type="text" id="sa" placeholder="Artis">
        <input type="text" id="sy" placeholder="Link YouTube (Cth: https://www.youtube.com/watch?v=...)">
        <textarea id="sl" rows="5" placeholder="Lirik lagu..."></textarea>
        <button onclick="addS()">Publish</button>
    </div>

    <div class="card">
        <h2>📂 Senarai Lagu</h2>
        <div id="snList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
            authDomain: "meowlyrics-6eacb.firebaseapp.com",
            projectId: "meowlyrics-6eacb",
            appId: "1:183440345480:web:4fb71060be2cc24df0923d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Album Logic
        window.addA = async () => {
            await addDoc(collection(db, "albums"), { name: document.getElementById('an').value, url: document.getElementById('au').value });
            alert("Album Added!");
        };

        onSnapshot(collection(db, "albums"), s => {
            document.getElementById('alList').innerHTML = s.docs.map(d => `<div class="item">${d.data().name} <button onclick="del('albums','${d.id}')">Padam</button></div>`).join('');
        });

        // Song Logic
        window.addS = async () => {
            await addDoc(collection(db, "songs"), {
                title: document.getElementById('st').value,
                artist: document.getElementById('sa').value,
                ytUrl: document.getElementById('sy').value,
                lyrics: document.getElementById('sl').value,
                likes: 0, createdAt: serverTimestamp()
            });
            alert("Song Published!");
        };

        onSnapshot(collection(db, "songs"), s => {
            document.getElementById('snList').innerHTML = s.docs.map(d => `<div class="item">${d.data().title} <button onclick="del('songs','${d.id}')">Padam</button></div>`).join('');
        });

        window.del = async (c, i) => { if(confirm("Hapus?")) await deleteDoc(doc(db, c, i)); };
    </script>
</body>
</html>
