<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>MeowLyrics Admin | Manage</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-box { background: white; padding: 30px; border-radius: 25px; max-width: 600px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #2D3436; font-weight: 800; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #eee; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }
        .btn-add { background: #FFD32D; color: #2D3436; }
        .btn-edit { background: #00b894; color: white; display: none; }
        .song-item { background: #fff; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 id="form-title">Tambah Lagu Baru 🐾</h2>
    <input type="hidden" id="song-id">
    <input type="text" id="title" placeholder="Tajuk Lagu">
    <input type="text" id="artist" placeholder="Nama Artis">
    <input type="text" id="audio-url" placeholder="Link MP3 (URL Direct)">
    <textarea id="lyrics" rows="6" placeholder="Masukkan Lirik Di Sini..."></textarea>
    
    <button class="btn btn-add" id="addBtn" onclick="saveSong()">Simpan Lagu</button>
    <button class="btn btn-edit" id="updateBtn" onclick="updateSong()">Kemaskini Lagu</button>
    <button id="cancelBtn" onclick="resetForm()" style="display:none; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Batal Edit</button>
</div>

<div id="admin-song-list" style="max-width:600px; margin: 30px auto;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjjVB2w9W7si7BYDQj6OxGF7CYDOv42OA",
        authDomain: "meowlyrics-6eacb.firebaseapp.com",
        projectId: "meowlyrics-6eacb",
        appId: "1:183440345480:web:4fb71060be2cc24df0923d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Papar Senarai Lagu untuk Edit/Padam
    onSnapshot(query(collection(db, "songs"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById('admin-song-list');
        list.innerHTML = '<h3>Senarai Lagu Anda:</h3>';
        snap.forEach(d => {
            const s = d.data();
            list.innerHTML += `
                <div class="song-item">
                    <div>
                        <b>${s.title}</b><br><small>${s.artist}</small>
                    </div>
                    <div>
                        <button onclick="prepareEdit('${d.id}', '${s.title}', '${s.artist}', \`${s.lyrics.replace(/`/g, "'")}\`, '${s.audioUrl || ""}')" style="color:blue;">Edit</button>
                        <button onclick="deleteSong('${d.id}')" style="color:red;">Padam</button>
                    </div>
                </div>
            `;
        });
    });

    // Tambah Lagu Baru
    window.saveSong = async () => {
        const title = document.getElementById('title').value;
        const artist = document.getElementById('artist').value;
        const lyrics = document.getElementById('lyrics').value;
        const audioUrl = document.getElementById('audio-url').value;

        if(!title || !artist || !lyrics) return alert("Sila isi semua!");

        await addDoc(collection(db, "songs"), {
            title, artist, lyrics, audioUrl, createdAt: serverTimestamp(), likes: 0
        });
        alert("Lagu Berjaya Ditambah!");
        resetForm();
    };

    // Sediakan Data untuk Edit
    window.prepareEdit = (id, title, artist, lyrics, audio) => {
        document.getElementById('song-id').value = id;
        document.getElementById('title').value = title;
        document.getElementById('artist').value = artist;
        document.getElementById('lyrics').value = lyrics;
        document.getElementById('audio-url').value = audio;

        document.getElementById('form-title').innerText = "Edit Lagu 📝";
        document.getElementById('addBtn').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        document.getElementById('cancelBtn').style.display = "block";
    };

    // Simpan Perubahan (Update)
    window.updateSong = async () => {
        const id = document.getElementById('song-id').value;
        await updateDoc(doc(db, "songs", id), {
            title: document.getElementById('title').value,
            artist: document.getElementById('artist').value,
            lyrics: document.getElementById('lyrics').value,
            audioUrl: document.getElementById('audio-url').value
        });
        alert("Lagu Dikemaskini!");
        resetForm();
    };

    window.deleteSong = async (id) => { if(confirm("Padam lagu ni?")) await deleteDoc(doc(db, "songs", id)); };

    window.resetForm = () => {
        document.getElementById('title').value = '';
        document.getElementById('artist').value = '';
        document.getElementById('lyrics').value = '';
        document.getElementById('audio-url').value = '';
        document.getElementById('form-title').innerText = "Tambah Lagu Baru 🐾";
        document.getElementById('addBtn').style.display = "block";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('cancelBtn').style.display = "none";
    };
</script>
</body>
</html>
